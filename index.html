<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🅿</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>月租登記系統</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700;900&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/@mdi/font@7/css/materialdesignicons.min.css" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // SPA fallback 還原：404.html 會把原本路徑存進 sessionStorage，
      // 這裡讀出來用 history.replaceState 還原，React Router 接手後就能正常犩渲
      (function () {
        var redirect = sessionStorage.getItem("spa_redirect");
        if (redirect) {
          sessionStorage.removeItem("spa_redirect");
          if (redirect !== location.pathname + location.search + location.hash) {
            history.replaceState(null, "", redirect);
          }
        }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
